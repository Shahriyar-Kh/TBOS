  /api/v1/videos/instructor/:
    get:
      operationId: videos_instructor_list
      description: |-
        List videos for instructor-owned courses.

        JWT Bearer authentication is used for protected endpoints. Include the access token in the Authorization header as: Bearer <token>.

        Role-based access:
        - Admin: platform-wide management and reporting endpoints.
        - Instructor: course-authoring, grading, quiz authoring, and instructor analytics.
        - Student: course consumption, submissions, quiz attempts, payments, and progress tracking.
      summary: List instructor videos
      parameters:
      - in: query
        name: course
        schema:
          type: string
          format: uuid
        description: Filter by course identifier.
      - in: query
        name: lesson
        schema:
          type: string
          format: uuid
        description: Filter by lesson identifier.
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: page
        schema:
          type: integer
        description: Page number to retrieve.
      - in: query
        name: page_size
        schema:
          type: integer
        description: Number of results per page. Maximum 100 unless overridden by
          the endpoint.
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Videos
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
