openapi: 3.0.3
info:
  title: TechBuilt Open School API
  version: v1
  description: |-
    LMS backend API for managing courses, users, enrollments, quizzes, assignments, payments, and analytics.

    Authentication: JWT Bearer tokens are required for protected endpoints and must be sent as `Authorization: Bearer <token>`.

    Response envelope: successful responses use `{success, message, data}` and validation errors return `{success, message, errors}`.

    Versioning: all current endpoints are published under `/api/v1/`. The URL namespace structure reserves `/api/v2/` for future backwards-compatible expansion.

    Rate limits: authentication flows are limited to 10 requests per minute per IP, and quiz submissions are limited to 30 POST requests per minute per authenticated user.
  contact:
    name: TBOS API Support
    email: api-support@tbos.local
    url: http://localhost:8000/api/docs/
paths:
  /api/v1/:
    get:
      operationId: root_retrieve
      description: GET /api/v1/ — API index listing all available endpoints.
      summary: API root index
      tags:
      - Accounts
      responses:
        '200':
          content:
            application/json:
              schema:
                description: API root metadata and endpoint index.
          description: ''
  /api/v1/admin/certificates/:
    get:
      operationId: admin_certificates_list
      description: GET /api/v1/admin/certificates/
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - admin
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCertificateList'
          description: ''
  /api/v1/admin/certificates/{id}/:
    delete:
      operationId: admin_certificates_destroy
      description: DELETE /api/v1/admin/certificates/{id}/
      summary: Delete certificate
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Certificates
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCertificateDeleteResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
              examples:
                401Error:
                  value:
                    success: false
                    message: Authentication credentials were not provided.
                    errors:
                      detail: Authentication credentials were not provided.
                    status_code: 401
          description: Authentication credentials were missing or invalid.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
              examples:
                403Error:
                  value:
                    success: false
                    message: You do not have permission to perform this action.
                    errors:
                      detail: You do not have permission to perform this action.
                    status_code: 403
          description: The authenticated user does not have permission to access this
            resource.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
              examples:
                404Error:
                  value:
                    success: false
                    message: Resource not found.
                    errors:
                      detail: Resource not found.
                    status_code: 404
          description: The requested resource could not be found.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
              examples:
                500Error:
                  value:
                    success: false
                    message: An unexpected error occurred.
                    errors:
                      detail: An unexpected error occurred.
                    status_code: 500
          description: Unexpected server-side failure.
