components:
  schemas:
    AIContentSuggestion:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        suggestion_type:
          $ref: '#/components/schemas/SuggestionTypeEnum'
        input_text:
          type: string
        output_text:
          type: string
          readOnly: true
        course:
          type: string
          format: uuid
          nullable: true
        initiated_by:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - initiated_by
      - input_text
      - output_text
      - suggestion_type
    AIQuizGenerateRequestRequest:
      type: object
      properties:
        course_id:
          type: string
          format: uuid
        prompt:
          type: string
          minLength: 1
        num_questions:
          type: integer
          maximum: 50
          minimum: 1
          default: 10
      required:
      - course_id
      - prompt
    AIQuizGenerateResponse:
      type: object
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/AIQuizGeneration'
      required:
      - data
      - message
    AIQuizGeneration:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        course:
          type: string
          format: uuid
        quiz:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        prompt:
          type: string
          description: Topic/content to generate quiz from.
        num_questions:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        status:
          allOf:
          - $ref: '#/components/schemas/Status316Enum'
          readOnly: true
        error_message:
          type: string
          readOnly: true
        initiated_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - course
      - created_at
      - error_message
      - id
      - initiated_by
      - prompt
      - quiz
      - status
    AIQuizStatusResponse:
      type: object
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/AIQuizGeneration'
      required:
      - data
      - message
    AISuggestRequestRequest:
      type: object
      properties:
        suggestion_type:
          $ref: '#/components/schemas/SuggestionTypeEnum'
        input_text:
          type: string
          minLength: 1
        course_id:
          type: string
          format: uuid
      required:
      - input_text
      - suggestion_type
    AISuggestResponse:
      type: object
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/AIContentSuggestion'
      required:
      - data
      - message
    AISuggestionHistoryResponse:
      type: object
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/AIContentSuggestion'
      required:
      - data
      - message
    ActivityTypeEnum:
      enum:
      - VIDEO_WATCH
      - QUIZ_ATTEMPT
      - ASSIGNMENT_SUBMIT
      - COURSE_COMPLETE
      - LOGIN
      type: string
      description: |-
        * `VIDEO_WATCH` - Video Watch
        * `QUIZ_ATTEMPT` - Quiz Attempt
        * `ASSIGNMENT_SUBMIT` - Assignment Submit
        * `COURSE_COMPLETE` - Course Complete
        * `LOGIN` - Login
