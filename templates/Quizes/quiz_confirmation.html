
<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Confirmation</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS for Layout -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'assets/css/quiz_confirmation.css' %}">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header text-center">
                <h2 class="quiz-title">{{ quiz.title }}</h2>
            </div>
            <div class="card-body">
                <!-- Quiz Details -->
                <p><strong>Total Time Limit:</strong> {{ time_limit }} minutes</p>
                <p><strong>Remaining Attempts:</strong> {{ attempts_left }}</p>

                <!-- Start Quiz Button -->
                {% if attempts_left > 0 %}
                    <div class="text-center mt-4">
                        <a href="{% url 'quiz_start' quiz.id %}" class="btn btn-primary btn-lg">Start Quiz</a>
                    </div>
                {% else %}
                    <div class="alert alert-danger text-center mt-4">
                        You have no attempts left for this quiz.
                    </div>
                {% endif %}
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="{% static 'assets/js/quiz_confirmation.js' %}" defer></script>

</body>
</html>
