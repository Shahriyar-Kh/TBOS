
<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Assignment: {{ assignment.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'assets/css/start_assignment.css' %}" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/5.9.0/tinymce.min.js"></script>
    <style>
        .assignment-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        .time-display {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.2rem;
            margin: 1.5rem 0;
            text-align: center;
        }
        .editor-container {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            margin: 1rem 0;
        }
        #auto-save-status {
            font-size: 0.9rem;
            color: #6c757d;
            text-align: right;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body class="bg-light">
    <div class="assignment-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-1">{{ assignment.title }}</h1>
                <p class="text-muted mb-0">{{ assignment.course.title }}</p>
            </div>
            <div class="time-display">
                <i class="bi bi-clock me-2"></i>
                <span id="timer" class="fw-bold"></span>
            </div>
        </div>

        <div class="mb-4">
            <p class="lead">{{ assignment.description }}</p>
        </div>

        <form method="POST" enctype="multipart/form-data" id="assignment-form">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label fw-bold mb-3">Your Answer</label>
                <div class="editor-container">
                    <textarea id="submission_text" name="submission_text" class="form-control">{{ submission.submission_text }}</textarea>
                </div>
                <div id="auto-save-status"></div>
            </div>

            <div class="mb-4">
                <label for="file_upload" class="form-label fw-bold">Upload File (PDF/Image)</label>
                <input type="file" id="file_upload" name="file_upload" class="form-control" accept=".pdf,.png,.jpg,.jpeg">
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary" id="submit-btn">
                    Submit Assignment
                </button>
            </div>
        </form>
    </div>

    <script>
        window.remaining_time = {{ remaining_time }};
        window.submission_id = {{ submission.id }};
    </script>



    <script src="{% static 'assets/js/assignment.js' %}"></script>
</body>
</html>
