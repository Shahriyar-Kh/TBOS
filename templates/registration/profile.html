{% extends 'base.html' %}
{% block title %}Profile{% endblock %}
{% load static %}
{% block content %}

<!-- PAGE TITLE -->
<header class="page-title p-3 p-md-1" style="background-image: none;">
    <div class="container text-center py-4">
        <h1 class="display-4 fw-5 mb-0">Profile Update</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb breadcrumb-scroll justify-content-center">
                <li class="breadcrumb-item">
                    <a class="text-gray-800" href="#">Home</a>
                </li>
                <li class="breadcrumb-item text-gray-800 active" aria-current="page">Profile Update</li>
            </ol>
        </nav>
    </div>
</header>

<img class="d-none img-fluid" src="..." alt="...">

<!-- Centering the card -->
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card" style="width: 800px;">
        {% include 'components/msg.html' %}
        <div class="card-body">
            <form method="post" action="{% url 'Profile_update' %}">
                {% csrf_token %}
                <div class="row">
                    <div class="col">
                        <div class="form-group mb-4">
                            <label>First Name</label>
                            <input type="text" class="form-control" placeholder="Enter First Name" name="first_name" value="{{ user.first_name }}">
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-group mb-4">
                            <label>Last Name</label>
                            <input type="text" class="form-control" placeholder="Enter Last Name" name="last_name" value="{{ user.last_name }}">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col">
                        <div class="form-group mb-4">
                            <label>Email Address</label>
                            <input type="email" class="form-control" placeholder="Enter Email" name="email" value="{{ user.email }}">
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-group mb-4">
                            <label>Username</label>
                            <input type="text" class="form-control" placeholder="Enter Username" name="username" value="{{ user.username }}">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col">
                        <div class="form-group mb-4">
                            <label>Password</label>
                            <input type="password" class="form-control" placeholder="Fill Only If You Want To Change Password" name="password">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Update Profile</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
